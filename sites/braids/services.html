<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
<header class="nav">
  <div class="wrap nav-inner">
    <a class="brand" href="./index.html"><span class="logo" id="logo">N</span><span id="brandName">Brand</span></a>
    <nav class="links">
      <a href="./index.html">Home</a>
      <a href="./services.html">Services</a>
      <a href="./book.html" class="btn">Book / Request</a>
    </nav>
  </div>
</header>

<main class="section">
  <div class="wrap">
    <h1 id="title">Services</h1>
    <p class="muted" id="sub"></p>

    <div class="grid" id="services"></div>

    <div class="section">
      <div class="card">
        <h2>Service area</h2>
        <p class="muted" id="area"></p>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="wrap footer-inner">
    <div class="small muted">© <span id="year"></span> <span id="brandName2">Brand</span></div>
    <div class="small muted">Built for demo</div>
  </div>
</footer>

<script type="module">
  import { loadSite, setText, setHTML } from "./app.js";
  const site = await loadSite();
  document.title = site.meta.title + " | Services";

  setText("logo", site.meta.logo);
  setText("brandName", site.meta.name);
  setText("brandName2", site.meta.name);
  setText("title", site.services.title);
  setText("sub", site.services.subtitle);
  setText("area", site.services.serviceArea);
  setText("year", new Date().getFullYear());

  setHTML("services", site.services.items.map(s=>`
    <div class="card">
      <h3>${s.name}</h3>
      <p class="muted">${s.desc}</p>
      <div class="badges">${s.points.map(p=>`<div class="badge">${p}</div>`).join("")}</div>
    </div>
  `).join(""));
</script>
</body>
</html>
